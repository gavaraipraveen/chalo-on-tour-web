[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Optional: Redirect trailing slash consistency
[[redirects]]
  from = "/packages"
  to = "/packages/"
  status = 301
  force = true

# Headers example (cache static assets)
[[headers]]
  for = "/static/css/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

